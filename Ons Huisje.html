const fmt = n => new Intl.NumberFormat("nl-BE", { style:"currency", currency:"EUR" }).format(n);

function saveState(s) {

async function readInvoiceWithAI(base64, fileName, apiKey) {
  if (!apiKey) throw new Error("Geen API-sleutel ingesteld. Ga naar Instellingen ⚙️ en plak je sleutel.");
  const mt = fileName.match(/\.png$/i) ? "image/png"
           : fileName.match(/\.jpe?g$/i) ? "image/jpeg"
           : "application/pdf";
  const blk = mt === "application/pdf"
    ? { type:"document", source:{ type:"base64", media_type:"application/pdf", data:base64 } }
    : { type:"image",    source:{ type:"base64", media_type:mt, data:base64 } };
  const faseOpts = ALL_FASES.map(f => `${f.id}: ${f.name}`).join(", ");
  let resp;
  try {
    resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-haiku-4-5",
        max_tokens: 1000,
        messages: [{ role:"user", content:[
          blk,
          { type:"text", text:`Lees deze factuur en geef ALLEEN een JSON object terug (geen markdown, geen backticks) met: {"leverancier":"naam","bedrag":getal excl BTW,"btw":BTW bedrag als getal,"datum":"YYYY-MM-DD","omschrijving":"korte omschrijving","fase":"meest passende fase ID"}. Mogelijke fases: ${faseOpts}. Als je iets niet kunt lezen, gebruik null.` }
        ]}]
      })
    });
  } catch (netErr) {
    throw new Error("Netwerkfout: kan Anthropic niet bereiken. Check je internet. (" + netErr.message + ")");
  }
  const data = await resp.json().catch(() => ({}));
  if (!resp.ok) {
    const msg = data?.error?.message || `HTTP ${resp.status}`;
    if (resp.status === 401) throw new Error("API-sleutel ongeldig of verlopen. Maak een nieuwe in console.anthropic.com.");
    if (resp.status === 429) throw new Error("Te veel verzoeken óf geen krediet meer. Check Billing op console.anthropic.com.");
    if (resp.status === 400 && /credit|balance/i.test(msg)) throw new Error("Geen krediet meer op je Anthropic-account. Laad bij op console.anthropic.com → Billing.");
    throw new Error("API-fout: " + msg);
  }
  const txt = (data.content || []).find(b => b.type==="text")?.text || "";
  try {
    return JSON.parse(txt.replace(/```json\s*/g,"").replace(/```/g,"").trim());
  } catch {
    throw new Error("AI gaf geen leesbaar antwoord terug. Probeer opnieuw of voeg manueel toe.");
  }
}

function ProgressBar({ value, max, height=8, color, danger=false }) {
  const p = pct(value, max);
  const over = danger && value > max;
  const c = over ? "var(--red)" : (color || "var(--accent)");
  return (
    <div style={{
      width:"100%", height:height, borderRadius:height,
      background:"var(--sf3)", overflow:"hidden", position:"relative"
    }}>
      <div style={{
        width:`${clamp(p,0,100)}%`, height:"100%", borderRadius:height,
        background:c,
        transition:"width 0.8s cubic-bezier(0.22,1,0.36,1)",
        position:"relative",
        overflow:"hidden"
      }}>
        {over && <div style={{position:"absolute",inset:0,background:"linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent)",animation:"shimmer 2s linear infinite",backgroundSize:"200% 100%"}} />}
      </div>
    </div>
  );
}

function Btn({ children, primary, danger, amber, small, icon, style:s, disabled, ...props }) {
  const bg = danger ? "var(--red)"
           : amber  ? "var(--amber)"
           : primary ? "var(--accent)"
           : "var(--sf1)";
  const col = (danger || amber || primary) ? "#fff" : "var(--tx)";
  const brd = (danger || amber || primary) ? "none" : "1px solid var(--brd)";
  const shad = primary ? "0 2px 8px rgba(168,113,74,0.25)"
             : amber   ? "0 2px 8px rgba(184,135,43,0.25)"
             : "none";
  return (
    <button
      {...props}
      disabled={disabled}
      style={{
        display:"inline-flex", alignItems:"center", justifyContent:"center", gap:6,
        padding: small ? "6px 12px" : "10px 18px",
        borderRadius: small ? "var(--r-sm)" : "var(--r-md)",
        fontSize: small ? 12 : 13,
        fontWeight:600, background:bg, color:col, border:brd, boxShadow:shad,
        transition:"all 0.15s", opacity: disabled ? 0.5 : 1,
        cursor: disabled ? "not-allowed" : "pointer",
        whiteSpace:"nowrap",
        ...s
      }}
    >{children}</button>
  );
}

function Select({ label, children, ...props }) {

    <div style={{ marginBottom:14 }}>
      {label && <label style={{

          color:"var(--tx)", fontSize:14, outline:"none",
          ...props.style
        }}
      >{children}</select>
    </div>
  );
}

function Modal({ children, onClose, maxWidth=460 }) {
  useEffect(() => {
    const handler = e => { if (e.key === "Escape") onClose?.(); };
    document.addEventListener("keydown", handler);
    return () => document.removeEventListener("keydown", handler);
  }, [onClose]);

  return (
    <div
      onClick={e => { if (e.target === e.currentTarget) onClose?.(); }}
      style={{
        position:"fixed", inset:0, zIndex:200,
        background:"rgba(40,33,26,0.35)",
        backdropFilter:"blur(10px)", WebkitBackdropFilter:"blur(10px)",
        display:"flex", alignItems:"center", justifyContent:"center",
        padding:16
      }}
    >
      <div className="anim-scalein" style={{
        background:"var(--sf1)", borderRadius:"var(--r-xl)",
        border:"1px solid var(--brd)", boxShadow:"var(--sh-lg)",
        padding:26, width:"100%", maxWidth:maxWidth,
        maxHeight:"90vh", overflowY:"auto"
      }}>{children}</div>
    </div>
  );
}

function Divider({ style:s }) {
  return <div style={{ height:1, background:"var(--brd)", margin:"0", ...s }} />;

/* ════════════════════════════════════════
   SYNC SETUP MODAL
════════════════════════════════════════ */
function SyncSetupModal({ initial, onSaved, onClose, onDisable }) {
  const [step,    setStep]    = useState(initial ? "config" : "intro");
  const [url,     setUrl]     = useState(initial?.url || "");
  const [anon,    setAnon]    = useState(initial?.anonKey || "");
  const [pw,      setPw]      = useState("");
  const [testing, setTesting] = useState(false);
  const [err,     setErr]     = useState("");
  const [errRaw,  setErrRaw]  = useState("");
  const [showSql, setShowSql] = useState(false);

  const sql = `create table public.huisje_state (
  room text primary key,
  data jsonb not null,
  updated_at timestamptz not null default now(),
  updated_by text
);
alter table public.huisje_state enable row level security;
create policy "anon read"   on public.huisje_state for select using (true);
create policy "anon insert" on public.huisje_state for insert with check (true);
create policy "anon update" on public.huisje_state for update using (true);
alter publication supabase_realtime add table public.huisje_state;`;

  const save = async (skipTest=false) => {
    setErr(""); setErrRaw(""); setTesting(true);
    try {
      const u = url.trim().replace(/\/$/, "");
      const k = anon.trim();
      if (!u.startsWith("https://") || !k.startsWith("ey")) {
        setErr("URL moet beginnen met https:// en de anon key met 'ey...'"); setTesting(false); return;
      }
      let room = initial?.room;
      if (pw && pw.length >= 4) {
        room = await OnsHuisjeSync.hashPassword(pw);
      } else if (!room) {
        setErr("Kies een gezamenlijk wachtwoord van minstens 4 tekens."); setTesting(false); return;
      }
      if (!skipTest) {
        const test = await OnsHuisjeSync.testConnection(u, k);
        if (!test.ok) { setErr(test.reason); setErrRaw(test.raw || ""); setTesting(false); return; }
      }
      OnsHuisjeSync.saveSyncConfig({ url: u, anonKey: k, room });
      onSaved();
    } catch (e) {
      console.warn(e);
      setErr("Kon geen verbinding maken. Check URL en internet.");
    } finally { setTesting(false); }
  };

  const sqlBox = { background:"var(--sf2)", padding:"10px 13px", borderRadius:"var(--r-md)", fontFamily:"'JetBrains Mono',monospace", fontSize:11, color:"var(--tx2)", lineHeight:1.55, whiteSpace:"pre-wrap", wordBreak:"break-all", border:"1px solid var(--brd)", maxHeight:200, overflow:"auto" };

  return (
    <Modal onClose={onClose} maxWidth={560}>
      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:18 }}>
        <span style={{ fontSize:24 }}>☁️</span>
        <h3 style={{ fontSize:18, fontWeight:700, flex:1 }}>
          {step === "intro" ? "Cloud-sync instellen" : (initial ? "Sync-instellingen" : "Verbinding & wachtwoord")}
        </h3>
        <button onClick={onClose} style={{ fontSize:20, color:"var(--tx3)", padding:4 }}>×</button>
      </div>

      {step === "intro" && (
        <div>
          <p style={{ fontSize:13, color:"var(--tx2)", lineHeight:1.7, marginBottom:14 }}>
            Met cloud-sync zien jij en je partner dezelfde facturen op gsm én laptop.
            We gebruiken <a href="https://supabase.com" target="_blank" rel="noopener" style={{color:"var(--accent)"}}>Supabase</a> — gratis, geen creditcard nodig.
          </p>
          <div style={{ background:"var(--accent-l)", borderRadius:"var(--r-md)", padding:"14px 16px", marginBottom:14, fontSize:13, color:"var(--tx2)", lineHeight:1.7 }}>
            <strong style={{color:"var(--tx)"}}>Eenmalige stappen (≈5 min):</strong>
            <ol style={{ paddingLeft:20, marginTop:8 }}>
              <li>Account maken op <a href="https://supabase.com" target="_blank" rel="noopener" style={{color:"var(--accent)"}}>supabase.com</a></li>
              <li><strong>New project</strong> → kies naam &amp; database-wachtwoord (even noteren)</li>
              <li>Wacht ~1 min tot project klaar is</li>
              <li><strong>Project Settings → API</strong> → kopieer <em>Project URL</em> + <em>anon public key</em></li>
              <li><strong>SQL Editor</strong> → plak de SQL hieronder → Run</li>
              <li>Vul URL + key + gezamenlijk wachtwoord hieronder in (zelfde wachtwoord op beide toestellen)</li>
            </ol>
          </div>
          <div style={{ marginBottom:14 }}>
            <button onClick={() => setShowSql(s => !s)} style={{
              fontSize:12, fontWeight:600, color:"var(--accent)",
              background:"var(--accent-l)", padding:"6px 12px", borderRadius:6
            }}>{showSql ? "▼" : "▶"} SQL voor de tabel</button>
            {showSql && (
              <div style={{ marginTop:8 }}>
                <pre style={sqlBox}>{sql}</pre>
                <button onClick={() => navigator.clipboard?.writeText(sql)} style={{
                  marginTop:6, fontSize:11, fontWeight:600, color:"var(--tx3)",
                  background:"var(--sf2)", padding:"4px 10px", borderRadius:5, border:"1px solid var(--brd)"
                }}>📋 Kopieer SQL</button>
              </div>
            )}
          </div>
          <div style={{ display:"flex", gap:10 }}>
            <Btn style={{ flex:1 }} onClick={onClose}>Later</Btn>
            <Btn primary style={{ flex:2 }} onClick={() => setStep("config")}>Verder →</Btn>
          </div>
        </div>
      )}

      {step === "config" && (
        <div>
          <Input label="Project URL" value={url} onChange={e=>setUrl(e.target.value)}
            placeholder="https://xxxxx.supabase.co" mono />
          <Input label="Anon public key" value={anon} onChange={e=>setAnon(e.target.value)}
            placeholder="eyJhbGc..." mono />
          <Input
            label={initial ? "Wachtwoord wijzigen (laat leeg om hetzelfde te houden)" : "Gezamenlijk wachtwoord"}
            type="password" value={pw} onChange={e=>setPw(e.target.value)}
            placeholder="zelfde op gsm én laptop" />
          <div style={{ background:"var(--amber-l)", borderRadius:"var(--r-md)", padding:"10px 13px", marginBottom:14, fontSize:11, color:"var(--tx2)", lineHeight:1.55 }}>
            🔐 <strong>Tip:</strong> kies iets dat alleen jullie kennen, bv. <em>kersenweg-2026</em>. Je partner moet hetzelfde wachtwoord invullen op zijn/haar toestel.
          </div>
          {err && (
            <div style={{ background:"var(--red-l)", color:"var(--red)", padding:"10px 13px", borderRadius:"var(--r-md)", fontSize:12, marginBottom:10, lineHeight:1.5 }}>
              ⚠️ {err}
              {errRaw && (
                <details style={{ marginTop:6 }}>
                  <summary style={{ cursor:"pointer", fontSize:11, color:"var(--tx3)" }}>Technische details</summary>
                  <pre style={{ marginTop:6, fontSize:10, fontFamily:"'JetBrains Mono',monospace", color:"var(--tx2)", whiteSpace:"pre-wrap", wordBreak:"break-all", maxHeight:120, overflow:"auto", background:"var(--sf2)", padding:"6px 8px", borderRadius:6 }}>{errRaw}</pre>
                </details>
              )}
              <div style={{ marginTop:8, fontSize:11, color:"var(--tx2)", lineHeight:1.5 }}>
                💡 Weet je zeker dat de tabel bestaat in Supabase? Soms loopt de schema cache achter — je kan de test overslaan en de echte sync proberen.
                <button onClick={() => save(true)} style={{
                  display:"block", marginTop:6, fontSize:11, fontWeight:600,
                  color:"var(--tx)", background:"var(--sf1)",
                  padding:"5px 10px", borderRadius:5, border:"1px solid var(--brd)"
                }}>→ Toch opslaan (test overslaan)</button>
              </div>
            </div>
          )}
          <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
            {!initial && <Btn style={{ flex:"1 1 100px" }} onClick={() => setStep("intro")}>← Hulp</Btn>}
            {initial && onDisable && (
              <Btn style={{ flex:"1 1 100px", background:"var(--red-l)", color:"var(--red)" }} onClick={onDisable}>Uitschakelen</Btn>
            )}
            <Btn primary style={{ flex:"2 1 160px" }} onClick={() => save(false)} disabled={testing}>
              {testing ? "Testen…" : "Test & opslaan"}
            </Btn>
          </div>
        </div>
      )}
    </Modal>
  );
}

/* ════════════════════════════════════════
   SYNC INDICATOR (header pill)
════════════════════════════════════════ */
function SyncIndicator({ status, lastSync, lastEditor, deviceId, onClick }) {
  const map = {
    idle:     { c:"var(--tx3)",   bg:"var(--sf2)",      ic:"○",  t:"Sync uit" },
    disabled: { c:"var(--tx3)",   bg:"var(--sf2)",      ic:"⊘",  t:"Lokaal" },
    syncing:  { c:"var(--blue)",  bg:"var(--blue-l)",   ic:"↻",  t:"Synct…" },
    online:   { c:"var(--green)", bg:"var(--green-l)",  ic:"●",  t:"Synced" },
    offline:  { c:"var(--amber)", bg:"var(--amber-l)",  ic:"◐",  t:"Offline" },
    error:    { c:"var(--red)",   bg:"var(--red-l)",    ic:"!",  t:"Fout" },
  };
  const s = map[status] || map.idle;
  const tip = lastSync
    ? `Laatst gesynct: ${lastSync.toLocaleTimeString("nl-BE",{hour:"2-digit",minute:"2-digit"})}${lastEditor && lastEditor !== deviceId ? ` door ${lastEditor}` : ""}`
    : "Klik om sync in te stellen";
  return (
    <button onClick={onClick} title={tip} style={{
      display:"inline-flex", alignItems:"center", gap:5,
      padding:"5px 10px", borderRadius:999,
      background:s.bg, color:s.c, border:"none",
      fontSize:11, fontWeight:600, cursor:"pointer",
      whiteSpace:"nowrap"
    }}>
      <span style={{ fontSize:10, animation: status==="syncing" ? "pulse 1.2s infinite" : "none" }}>{s.ic}</span>
      <span className="hide-mobile">{s.t}</span>
    </button>
  );
}

function DashboardTab({ invoices, eigenMiddelen, savings, tranchesUsed }) {

    const m = {};

    return m;
  }, [invoices]);

  const bouwSpent  = MEETSTAAT_BOUW.reduce((s,f) => s + (spentByFase[f.id]||0), 0);
  const kbkSpent   = spentByFase["KBK"] || 0;
  const totalSpent = bouwSpent + kbkSpent;
  const totalEM    = eigenMiddelen.reduce((s,i) => s+i.bedrag, 0);
  const cashTotal  = eigenMiddelen.filter(i=>i.type==="cash").reduce((s,i)=>s+i.bedrag,0);
  const savTotal   = eigenMiddelen.filter(i=>i.type==="savings").reduce((s,i)=>s+i.bedrag,0);
  const loanUsed   = tranchesUsed * TRANCHE_AMOUNT;
  const loanRem    = LOAN_TOTAL - loanUsed;
  const overFases  = ALL_FASES.filter(f => spentByFase[f.id] > f.budget);

  return (
    <div>

          <div style={{ fontSize:10, fontWeight:700, color:"var(--tx3)", textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:6 }}>
            🏗️ Bouwfases A–Z
          </div>
          <div className="num-fit" style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:22, fontWeight:700, letterSpacing:"-0.02em", marginBottom:3 }}>
            {fmt(BOUW_BUDGET)}
          </div>
          <div style={{ fontSize:12, color:"var(--tx2)", marginBottom:12, lineHeight:1.4 }}>
            Besteed {fmt(bouwSpent)}&nbsp;·&nbsp;

              {fmt(Math.abs(BOUW_BUDGET-bouwSpent))} {bouwSpent>BOUW_BUDGET?"over":"over"}
            </span>
          </div>
          <ProgressBar value={bouwSpent} max={BOUW_BUDGET} height={10} danger />
          <div style={{ fontSize:10, color:"var(--tx4)", marginTop:6 }}>
            {pct(bouwSpent,BOUW_BUDGET).toFixed(1)}% · incl. BTW · −25% zelf werken
          </div>
        </Card>

        <Card className="anim-fadeup d1 card-pad-sm" style={{ padding:20 }}>
          <div style={{ fontSize:10, fontWeight:700, color:"var(--tx3)", textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:6 }}>

          </div>

          </div>
          <div style={{ fontSize:12, color:"var(--tx2)", marginBottom:12, lineHeight:1.4 }}>
            Besteed {fmt(kbkSpent)}&nbsp;·&nbsp;
            <span style={{ color: kbkSpent<=KBK_BUDGET ? "var(--green)" : "var(--red)", fontWeight:600 }}>
              {fmt(Math.abs(KBK_BUDGET-kbkSpent))} rest
            </span>
          </div>
          <ProgressBar value={kbkSpent} max={KBK_BUDGET} height={10} color="var(--blue)" danger />

          }}>

              🏦 Lening
            </div>
            <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:17, fontWeight:700, color:"var(--accent)", lineHeight:1 }}>
              {fmt(loanUsed)}
            </div>

            <span style={{ fontFamily:"'JetBrains Mono',monospace", fontWeight:700, fontSize:14, color:"var(--green)" }}>{fmt(savings)}</span>

            background:"var(--sf2)", borderRadius:"var(--r-md)",
            padding:"11px 14px", display:"flex", justifyContent:"space-between", alignItems:"center"

            <span style={{ fontFamily:"'JetBrains Mono',monospace", fontWeight:700, fontSize:14 }}>{fmt(totalSpent + totalEM)}</span>

      {/* Over-budget alert */}
      {overFases.length > 0 && (
        <div className="anim-fadeup" style={{
          background:"var(--red-l)", borderRadius:"var(--r-lg)",
          padding:"13px 16px", border:"1px solid rgba(184,73,58,0.2)", marginBottom:12

          {overFases.map(f => (

            </div>
          ))}
        </div>
      )}

      {/* Mini fase grid */}
      <Card className="anim-fadeup d4" style={{ padding:18 }}>
        <div style={{ fontSize:13, fontWeight:600, marginBottom:14 }}>Budget per bouwfase</div>
        <div style={{
          display:"grid",
          gridTemplateColumns:"repeat(auto-fill, minmax(240px, 1fr))",
          gap:8
        }}>
          {MEETSTAAT_BOUW.map(f => {
            const sp = spentByFase[f.id]||0;
            const over = sp > f.budget;
            return (
              <div key={f.id} style={{
                padding:"10px 12px", borderRadius:"var(--r-md)",
                background:"var(--sf2)",
                border: over ? "1px solid rgba(184,73,58,0.3)" : "1px solid transparent",

        </div>
      </Card>
    </div>
  );
}

/* ════════════════════════════════════════
   MEETSTAAT TAB
════════════════════════════════════════ */
function Meetstaat({ invoices, expandedFase, onToggleFase }) {
  const spentByFase = useMemo(() => {
    const m = {};
    ALL_FASES.forEach(f => m[f.id] = 0);
    invoices.forEach(i => { if (m[i.fase] !== undefined) m[i.fase] += (i.bedrag||0) + (i.btw||0); });
    return m;
  }, [invoices]);

  const totalSpent = ALL_FASES.reduce((s,f) => s + (spentByFase[f.id]||0), 0);

  return (
    <Card className="anim-fadeup" style={{ padding:0 }}>
      {/* Header row */}
      <div style={{
        display:"grid", gridTemplateColumns:"52px 1fr 106px 110px 88px 20px",
        gap:8, padding:"10px 16px",
        borderBottom:"1px solid var(--brd)",
        fontSize:10, fontWeight:700, color:"var(--tx4)",
        textTransform:"uppercase", letterSpacing:"0.05em"
      }}>
        <span>ID</span><span>Fase</span>
        <span style={{textAlign:"right"}}>Budget</span>
        <span style={{textAlign:"center"}}>Voortgang</span>
        <span style={{textAlign:"right"}}>Rest</span>
        <span></span>
      </div>

      {ALL_FASES.map((f, idx) => {
        const sp   = spentByFase[f.id] || 0;
        const over = sp > f.budget;
        const rem  = f.budget - sp;
        const exp  = expandedFase === f.id;
        const faseInvoices = invoices.filter(i => i.fase === f.id);

        return (
          <Fragment key={f.id}>
            <div
              onClick={() => onToggleFase(f.id)}
              style={{
                display:"grid", gridTemplateColumns:"52px 1fr 106px 110px 88px 20px",
                gap:8, padding:"11px 16px", cursor:"pointer",
                background: exp ? "var(--sf2)" : "transparent",
                borderLeft: over ? "3px solid var(--red)" : "3px solid transparent",
                borderBottom:"1px solid var(--brd)",
                alignItems:"center",
                transition:"background 0.12s"
              }}
            >
              <Badge color={f.id==="KBK"?"var(--blue)":"var(--accent)"} bg={f.id==="KBK"?"var(--blue-l)":"var(--accent-l)"}>{f.id}</Badge>
              <span style={{ fontSize:13, fontWeight:500, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{f.name}</span>
              <span style={{ fontSize:11, fontFamily:"'JetBrains Mono',monospace", color:"var(--tx3)", textAlign:"right" }}>{fmt(f.budget)}</span>
              <div style={{ padding:"0 4px" }}><ProgressBar value={sp} max={f.budget} height={6} danger /></div>
              <span style={{
                fontSize:11, fontFamily:"'JetBrains Mono',monospace", fontWeight:600,
                textAlign:"right", color: over ? "var(--red)" : (sp > 0 ? "var(--green)" : "var(--tx4)")
              }}>
                {sp > 0 ? (over ? `+${fmt(Math.abs(rem))}` : fmt(rem)) : fmt(rem)}
              </span>
              <span style={{
                fontSize:10, color:"var(--tx4)",
                transform: exp ? "rotate(180deg)" : "none",
                transition:"transform 0.2s", textAlign:"center"
              }}>▼</span>
            </div>

            {exp && (
              <div style={{
                padding:"8px 16px 12px 70px",
                borderBottom:"1px solid var(--brd)",
                background:"var(--bg2)"
              }}>
                {faseInvoices.length === 0 ? (
                  <div style={{ fontSize:12, color:"var(--tx3)", fontStyle:"italic", padding:"4px 0" }}>
                    Nog geen uitgaven voor deze fase.
                  </div>
                ) : (
                  faseInvoices.map((inv, i, arr) => (
                    <div key={inv.id} style={{
                      display:"grid", gridTemplateColumns:"90px 1fr 90px",
                      gap:8, padding:"6px 0",
                      borderBottom: i < arr.length-1 ? "1px solid var(--brd)" : "none",
                      fontSize:12
                    }}>
                      <span style={{ fontFamily:"'JetBrains Mono',monospace", color:"var(--tx3)" }}>{inv.datum}</span>
                      <span style={{ overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                        <strong style={{ color:"var(--tx)" }}>{inv.leverancier}</strong>
                        {inv.omschrijving && <span style={{color:"var(--tx3)"}}> — {inv.omschrijving}</span>}
                      </span>
                      <span style={{ fontFamily:"'JetBrains Mono',monospace", fontWeight:600, textAlign:"right" }}>
                        {fmt((inv.bedrag||0)+(inv.btw||0))}
                      </span>
                    </div>
                  ))
                )}
              </div>
            )}
          </Fragment>
        );
      })}

      {/* Total row */}
      <div style={{
        display:"grid", gridTemplateColumns:"52px 1fr 106px 110px 88px 20px",
        gap:8, padding:"12px 16px", borderTop:"2px solid var(--brd2)",
        alignItems:"center", fontWeight:700, fontSize:13
      }}>
        <span></span>
        <span>Totaal</span>
        <span style={{ textAlign:"right", fontFamily:"'JetBrains Mono',monospace", fontSize:12, color:"var(--tx3)" }}>{fmt(TOTAL_BUDGET)}</span>
        <div style={{ padding:"0 4px" }}><ProgressBar value={totalSpent} max={TOTAL_BUDGET} height={6} danger /></div>
        <span style={{
          textAlign:"right", fontFamily:"'JetBrains Mono',monospace",
          color: totalSpent <= TOTAL_BUDGET ? "var(--green)" : "var(--red)", fontSize:12
        }}>{fmt(TOTAL_BUDGET-totalSpent)}</span>
        <span></span>
      </div>
    </Card>
  );
}

/* ════════════════════════════════════════
   FACTUREN TAB
════════════════════════════════════════ */
function FacturenTab({ invoices, eigenMiddelen, onEditInvoice, onDeleteInvoice, onEditEM, onDeleteEM, onAddEM }) {
  const [filters, setFilters] = useState({ leverancier:"", datum:"", fase:"", bedragMin:"", bedragMax:"" });
  const setF = (k,v) => setFilters(p => ({...p,[k]:v}));
  const hasFilters = Object.values(filters).some(Boolean);

  const filtered = useMemo(() => {
    return [...invoices].filter(inv => {
      if (filters.leverancier && !inv.leverancier.toLowerCase().includes(filters.leverancier.toLowerCase())) return false;
      if (filters.datum && inv.datum !== filters.datum) return false;
      if (filters.fase && inv.fase !== filters.fase) return false;
      if (filters.bedragMin && inv.bedrag < parseFloat(filters.bedragMin)) return false;
      if (filters.bedragMax && inv.bedrag > parseFloat(filters.bedragMax)) return false;
      return true;
    }).sort((a,b) => b.datum.localeCompare(a.datum));
  }, [invoices, filters]);

  const subtotal = filtered.reduce((s,i) => s + (i.bedrag||0) + (i.btw||0), 0);
  const totalEM  = eigenMiddelen.reduce((s,i) => s+i.bedrag, 0);

  return (
    <div className="anim-fadeup">
      {/* Facturen header */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10 }}>
        <h3 style={{ fontSize:16, fontWeight:700 }}>Facturen bouwbudget</h3>
        <div style={{ fontSize:12, color:"var(--tx3)" }}>{invoices.length} facturen</div>
      </div>

      {/* Filters */}
      <Card style={{ padding:"13px 15px", marginBottom:12 }}>
        <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:9 }}>
          <span style={{ fontSize:12, fontWeight:600 }}>🔍 Filter</span>
          {hasFilters && (
            <button
              onClick={() => setFilters({ leverancier:"", datum:"", fase:"", bedragMin:"", bedragMax:"" })}
              style={{
                fontSize:11, fontWeight:600, color:"var(--red)",
                background:"var(--red-l)", padding:"3px 10px",
                borderRadius:6, cursor:"pointer"
              }}
            >✕ Wis filters</button>
          )}
          {hasFilters && <span style={{fontSize:11,color:"var(--tx3)"}}>{filtered.length}/{invoices.length}</span>}
        </div>
        <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
          <input
            placeholder="Leverancier…"
            value={filters.leverancier}
            onChange={e => setF("leverancier", e.target.value)}
            style={{
              flex:"1 1 130px", padding:"8px 11px", borderRadius:"var(--r-sm)",
              border:"1px solid var(--brd)", background:"var(--sf2)",
              color:"var(--tx)", fontSize:12, outline:"none"

          />
          <input type="date" value={filters.datum} onChange={e => setF("datum", e.target.value)}

              flex:"0 0 135px", padding:"8px 11px", borderRadius:"var(--r-sm)",
              border:"1px solid var(--brd)", background:"var(--sf2)",
              color: filters.datum ? "var(--tx)" : "var(--tx3)", fontSize:12, outline:"none"
            }}
          />
          <select value={filters.fase} onChange={e => setF("fase", e.target.value)}
            style={{
              flex:"0 0 160px", padding:"8px 11px", borderRadius:"var(--r-sm)",
              border:"1px solid var(--brd)", background:"var(--sf2)",
              color: filters.fase ? "var(--tx)" : "var(--tx3)", fontSize:12, outline:"none"

          >
            <option value="">Alle fases</option>
            {ALL_FASES.map(f => <option key={f.id} value={f.id}>{f.id} — {f.name}</option>)}
          </select>
          <div style={{ display:"flex", gap:5, alignItems:"center" }}>
            <input type="number" placeholder="Min €" value={filters.bedragMin}

            />
          </div>
        </div>
      </Card>

      {/* Invoice list */}
      <Card style={{ padding:0, marginBottom:26 }}>
        {/* Column header */}
        <div className="invoice-head" style={{
          display:"grid", gridTemplateColumns:"86px 1fr 1fr 60px 94px 50px",
          gap:6, padding:"9px 14px",
          fontSize:10, fontWeight:700, color:"var(--tx4)",
          textTransform:"uppercase", letterSpacing:"0.05em",
          borderBottom:"1px solid var(--brd)"

              <div className="col-supp" style={{ overflow:"hidden" }}>
                <div style={{ fontWeight:500, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{inv.leverancier}</div>
              </div>
              <div className="hide-mobile" style={{ overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", fontSize:12, color:"var(--tx3)" }}>
                {inv.omschrijving}
              </div>
              <div className="hide-mobile"><Badge>{inv.fase}</Badge></div>
              <div className="col-amount" style={{ textAlign:"right" }}>
                <div style={{ fontFamily:"'JetBrains Mono',monospace", fontWeight:600, fontSize:13 }}>
                  {fmt((inv.bedrag||0)+(inv.btw||0))}
                </div>
                <div style={{ fontSize:9, color:"var(--tx4)", fontFamily:"'JetBrains Mono',monospace" }}>
                  {fmt(inv.bedrag||0)}+{fmt(inv.btw||0)}
                </div>
              </div>
              <div className="col-actions" style={{ display:"flex", gap:2, justifyContent:"flex-end" }}>

            <span>{hasFilters ? `Subtotaal (${filtered.length} facturen)` : `Totaal (${invoices.length} facturen)`}</span>
            <span style={{ fontFamily:"'JetBrains Mono',monospace", color:"var(--accent)", fontSize:14 }}>
              {fmt(subtotal)}

      {/* Eigen middelen */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10 }}>
        <div>

        <Btn small onClick={onAddEM}>+ Toevoegen</Btn>
      </div>

      <Card style={{ padding:0 }}>
        <div className="invoice-head" style={{
          display:"grid", gridTemplateColumns:"86px 1fr 1fr 80px 70px 50px",
          gap:6, padding:"9px 14px",
          fontSize:10, fontWeight:700, color:"var(--tx4)",
          textTransform:"uppercase", letterSpacing:"0.05em",
          borderBottom:"1px solid var(--brd)"
        }}>
          <span>Datum</span><span>Aan wie</span>

          <span style={{textAlign:"right"}}>Bedrag</span>
          <span style={{textAlign:"center"}}>Type</span>

        {[...eigenMiddelen].sort((a,b) => b.datum.localeCompare(a.datum)).map((em, idx) => (
          <div key={em.id} className="invoice-row" style={{
            display:"grid", gridTemplateColumns:"86px 1fr 1fr 80px 70px 50px",
            gap:6, padding:"10px 14px", fontSize:13, alignItems:"center",
            borderBottom:"1px solid var(--brd)",
            background: idx % 2 === 0 ? "transparent" : "rgba(0,0,0,0.01)"
          }}>
            <span className="col-date" style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:11, color:"var(--tx3)" }}>{em.datum}</span>
            <span className="col-supp" style={{ fontWeight:500, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{em.leverancier}</span>
            <span className="hide-mobile" style={{ fontSize:12, color:"var(--tx3)", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{em.omschrijving}</span>
            <span className="col-amount" style={{ fontFamily:"'JetBrains Mono',monospace", fontWeight:600, textAlign:"right" }}>{fmt(em.bedrag)}</span>
            <div className="col-fase" style={{ display:"flex", justifyContent:"center" }}>
              <Badge
                color={em.type==="cash" ? "var(--amber)" : "var(--blue)"}
                bg={em.type==="cash" ? "var(--amber-l)" : "var(--blue-l)"}
              >{em.type==="cash" ? "CASH" : "SPAAR"}</Badge>

            <div className="col-actions" style={{ display:"flex", gap:2, justifyContent:"flex-end" }}>

            </div>
          </div>
        ))}

        <div style={{
          display:"flex", justifyContent:"space-between", alignItems:"center",
          padding:"11px 14px", borderTop:"2px solid var(--brd2)",
          fontSize:13, fontWeight:700
        }}>
          <span>Totaal eigen middelen</span>
          <span style={{ fontFamily:"'JetBrains Mono',monospace", color:"var(--amber)", fontSize:14 }}>{fmt(totalEM)}</span>
        </div>
      </Card>
    </div>
  );
}

/* ════════════════════════════════════════
   LENING TAB
════════════════════════════════════════ */
function LeningTab({ tranchesUsed, onSetTranches, savings, onSetSavings, eigenMiddelen, invoices }) {
  const loanUsed    = tranchesUsed * TRANCHE_AMOUNT;
  const loanRem     = LOAN_TOTAL - loanUsed;
  const totalEM     = eigenMiddelen.reduce((s,i)=>s+i.bedrag,0);
  const totalSpent  = invoices.reduce((s,i)=>s+(i.bedrag||0)+(i.btw||0), 0);
  const balance     = loanUsed - totalSpent;   // positief = meer opgenomen dan besteed, negatief = meer besteed dan opgenomen
  const [savEdit, setSavEdit] = useState(String(savings));

  const handleSavBlur = () => {
    const v = parseFloat(savEdit);

/* ════════════════════════════════════════
   MAIN APP
════════════════════════════════════════ */
function App() {
  const [loaded,        setLoaded]        = useState(false);
  const [invoices,      setInvoices]      = useState(INITIAL_INVOICES_DATA);
  const [eigenMiddelen, setEigenMiddelen] = useState(INITIAL_EIGEN_MIDDELEN);
  const [savings,       setSavings]       = useState(7100);
  const [tranchesUsed,  setTranchesUsed]  = useState(0);
  const [apiKey,        setApiKey]        = useState("");
  const [activeTab,     setActiveTab]     = useState("dashboard");
  const [expandedFase,  setExpandedFase]  = useState(null);

  // Modals
  const [modal, setModal] = useState(null);
  // modal: { type: "invoice"|"eigen"|"duplicate"|"loading" }
  // + data

  const fileRef = useRef(null);

  /* ── Storage ── */
  useEffect(() => {
    const s = loadState();
    if (s) {
      // Opgeslagen data overschrijft startdata — maar alleen als er ook echt facturen in zitten
      // (om te voorkomen dat een lege oude save de nieuwe startdata weggooit)
      if (s.invoices && s.invoices.length > 0) setInvoices(s.invoices);
      if (s.eigenMiddelen && s.eigenMiddelen.length > 0) setEigenMiddelen(s.eigenMiddelen);
      if (s.savings != null) setSavings(s.savings);
      if (s.tranchesUsed != null) setTranchesUsed(s.tranchesUsed);
      if (s.apiKey) setApiKey(s.apiKey);
    }
    setLoaded(true);
  }, []);

  useEffect(() => {
    if (!loaded) return;
    saveState({ invoices, eigenMiddelen, savings, tranchesUsed, apiKey });
  }, [invoices, eigenMiddelen, savings, tranchesUsed, apiKey, loaded]);

  /* ── Cloud sync (Supabase) ──
     Bundel alle gedeelde state in één payload. apiKey blijft LOKAAL
     (komt niet in de cloud — elk toestel z'n eigen sleutel). */
  const [syncEnabled, setSyncEnabled] = useState(() => !!OnsHuisjeSync.loadSyncConfig());
  const [showSyncSetup, setShowSyncSetup] = useState(false);

  const syncPayload = useMemo(() => ({
    invoices, eigenMiddelen, savings, tranchesUsed
  }), [invoices, eigenMiddelen, savings, tranchesUsed]);

  const handleSyncPull = useCallback((data) => {
    if (!data) return;
    if (Array.isArray(data.invoices))      setInvoices(data.invoices);
    if (Array.isArray(data.eigenMiddelen)) setEigenMiddelen(data.eigenMiddelen);
    if (typeof data.savings === "number")      setSavings(data.savings);
    if (typeof data.tranchesUsed === "number") setTranchesUsed(data.tranchesUsed);
  }, []);

  const sync = OnsHuisjeSync.useSync({
    payload: syncPayload,
    onPull:  handleSyncPull,
    enabled: syncEnabled,
    loaded
  });

  const onSyncSaved = useCallback(() => {
    setSyncEnabled(true);
    setShowSyncSetup(false);
  }, []);
  const onSyncDisable = useCallback(() => {
    OnsHuisjeSync.saveSyncConfig(null);
    setSyncEnabled(false);
    setShowSyncSetup(false);
  }, []);

  /* ── Invoice helpers ── */
  const checkDuplicate = useCallback((inv) => {
    return invoices.find(ex =>
      ex.id !== inv.id &&
      ex.leverancier.toLowerCase() === inv.leverancier.toLowerCase() &&
      Math.abs((ex.bedrag||0) - (inv.bedrag||0)) < 0.01 &&
      ex.datum === inv.datum
    );
  }, [invoices]);

  const saveInvoice = useCallback((inv, force=false) => {
    if (!force) {
      const dup = checkDuplicate(inv);
      if (dup) {
        setModal({ type:"duplicate", newInvoice:inv, existing:dup });
        return;
      }
    }
    setInvoices(prev => {
      const idx = prev.findIndex(i => i.id === inv.id);
      return idx >= 0 ? prev.map(i => i.id===inv.id ? inv : i) : [...prev, inv];
    });
    setModal(null);
  }, [checkDuplicate]);

  const deleteInvoice = useCallback((id) => {
    if (confirm("Factuur verwijderen?")) setInvoices(prev => prev.filter(i => i.id !== id));
  }, []);

  /* ── Eigen Middelen helpers ── */
  const saveEM = useCallback((item) => {
    setEigenMiddelen(prev => {
      const idx = prev.findIndex(i => i.id===item.id);
      return idx >= 0 ? prev.map(i => i.id===item.id ? item : i) : [...prev, item];
    });
    setModal(null);
  }, []);

  const deleteEM = useCallback((id) => {
    if (confirm("Eigen middel verwijderen?")) setEigenMiddelen(prev => prev.filter(i => i.id!==id));
  }, []);

  /* ── File upload / AI ── */
  const handleFileUpload = useCallback(async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    e.target.value = "";

    if (!apiKey) {
      setModal({ type:"invoice", invoice:{ id:uid(), leverancier:"", bedrag:0, btw:0,
        datum:new Date().toISOString().slice(0,10), fase:ALL_FASES[0].id, omschrijving:"" } });
      return;
    }

    setModal({ type:"loading" });
    const reader = new FileReader();
    reader.onload = async (ev) => {
      const b64 = ev.target.result.split(",")[1];
      let result = null;
      let aiError = null;
      try {
        result = await readInvoiceWithAI(b64, file.name, apiKey);
      } catch (err) {
        aiError = err.message || String(err);
        console.error("AI scan failed:", err);
        alert("⚠️ AI-scan mislukt:\n\n" + aiError + "\n\nJe kan de factuur manueel invullen.");
      }
      setModal({
        type:"invoice",
        invoice: {
          id: uid(),
          leverancier: result?.leverancier || "",
          bedrag: result?.bedrag || 0,
          btw: result?.btw || 0,
          datum: result?.datum || new Date().toISOString().slice(0,10),
          fase: result?.fase || ALL_FASES[0].id,
          omschrijving: result?.omschrijving || "",
          aiSuggested: !!result
        }
      });
    };
    reader.onerror = () => {
      alert("⚠️ Kon bestand niet lezen.");
      setModal(null);
    };
    reader.readAsDataURL(file);
  }, [apiKey]);

  const resetAll = useCallback(() => {
    if (!confirm("Weet je zeker dat je alle facturen en instellingen wilt resetten?")) return;
    setInvoices([]);
    setEigenMiddelen(INITIAL_EIGEN_MIDDELEN);
    setSavings(SAVINGS_INITIAL);
    setTranchesUsed(0);
    localStorage.removeItem(STORAGE_KEY);
  }, []);

  /* ── Loading screen ── */
  if (!loaded) return (
    <div style={{
      display:"flex", alignItems:"center", justifyContent:"center",
      minHeight:"100vh", background:"var(--bg)"
    }}>
      <div style={{ textAlign:"center" }}>
        <div style={{ fontSize:56, marginBottom:16, animation:"pulse 2s infinite" }}>🏠</div>
        <div style={{ fontSize:20, fontWeight:700, fontFamily:"'Outfit',sans-serif" }}>Ons Huisje</div>
        <div style={{ fontSize:13, color:"var(--tx3)", marginTop:4 }}>laden…</div>
      </div>
    </div>
  );

  const TABS = [
    { id:"dashboard", label:"Overzicht",   icon:"📊" },
    { id:"fases",     label:"Meetstaat",   icon:"📋" },
    { id:"invoices",  label:"Facturen",    icon:"🧾" },
    { id:"lening",    label:"Lening",      icon:"🏦" },
    { id:"settings",  label:"Instellingen",icon:"⚙️"  },
  ];

  return (
    <div style={{ minHeight:"100vh", background:"var(--bg)" }}>
      {/* ── HEADER ── */}
      <header style={{
        position:"sticky", top:0, zIndex:50,
        background:"rgba(244,238,230,0.88)",
        backdropFilter:"blur(16px)", WebkitBackdropFilter:"blur(16px)",
        borderBottom:"1px solid var(--brd)",
      }}>
        <div className="app-header-inner" style={{
          maxWidth:940, margin:"0 auto",
          padding:"13px 20px",
          display:"flex", alignItems:"center", justifyContent:"space-between", gap:12
        }}>
          <div style={{ minWidth:0, flex:1 }}>
            <h1 className="app-title-row" style={{
              fontSize:19, fontWeight:800, letterSpacing:"-0.02em",
              display:"flex", alignItems:"center", gap:9
            }}>
              <span className="emoji" style={{fontSize:22}}>👨‍👩‍👧</span>Ons Huisje
            </h1>
            <p className="app-subtitle" style={{ fontSize:11, color:"var(--tx3)", marginTop:1 }}>
              Piras — Venken · Kersenweg 3, Dilsen-Stokkem
            </p>
          </div>
          <div className="app-actions" style={{ display:"flex", gap:7, alignItems:"center" }}>
            <SyncIndicator
              status={sync.syncStatus}
              lastSync={sync.lastSync}
              lastEditor={sync.lastEditor}
              deviceId={sync.deviceId}
              onClick={() => setShowSyncSetup(true)}
            />
            <Btn small onClick={() => setModal({
              type:"invoice",
              invoice:{ id:uid(), leverancier:"", bedrag:0, btw:0,
                datum:new Date().toISOString().slice(0,10), fase:ALL_FASES[0].id, omschrijving:"" }
            })}>✏️ Manueel</Btn>
            <Btn small primary onClick={() => fileRef.current?.click()}>📄 Factuur</Btn>
            <input ref={fileRef} type="file" accept=".pdf,.png,.jpg,.jpeg"
              style={{ display:"none" }} onChange={handleFileUpload} />
          </div>
        </div>
      </header>

      {/* ── NAV ── */}
      <nav style={{
        maxWidth:940, margin:"0 auto",
        padding:"8px 20px",
        display:"flex", gap:3,
        overflowX:"auto", WebkitOverflowScrolling:"touch"
      }}>
        {TABS.map(t => (
          <button key={t.id} onClick={() => setActiveTab(t.id)} style={{
            padding:"7px 14px", borderRadius:"var(--r-sm)",
            fontSize:13, fontWeight: activeTab===t.id ? 600 : 400,
            background: activeTab===t.id ? "var(--accent-l)" : "transparent",
            color: activeTab===t.id ? "var(--accent)" : "var(--tx3)",
            whiteSpace:"nowrap", transition:"all 0.12s",
            display:"flex", alignItems:"center", gap:5,
            border:"none", cursor:"pointer"
          }}>
            <span>{t.icon}</span><span className="hide-mobile">{t.label}</span>
          </button>
        ))}
      </nav>

      {/* ── MAIN ── */}
      <main style={{ maxWidth:940, margin:"0 auto", padding:"14px 20px 80px" }}>
        {activeTab === "dashboard" && (
          <DashboardTab
            invoices={invoices}
            eigenMiddelen={eigenMiddelen}
            savings={savings}
            tranchesUsed={tranchesUsed}
          />
        )}
        {activeTab === "fases" && (
          <Meetstaat
            invoices={invoices}
            expandedFase={expandedFase}
            onToggleFase={id => setExpandedFase(p => p===id ? null : id)}
          />
        )}
        {activeTab === "invoices" && (
          <FacturenTab
            invoices={invoices}
            eigenMiddelen={eigenMiddelen}
            onEditInvoice={inv => setModal({ type:"invoice", invoice:inv, isEditing:true })}
            onDeleteInvoice={deleteInvoice}
            onEditEM={em => setModal({ type:"eigen", item:{ ...em, _existing:true } })}
            onDeleteEM={deleteEM}
            onAddEM={() => setModal({ type:"eigen", item:{ id:uid(), leverancier:"", bedrag:0, btw:0, datum:new Date().toISOString().slice(0,10), omschrijving:"", type:"cash" } })}
          />
        )}
        {activeTab === "lening" && (
          <LeningTab
            invoices={invoices}
            tranchesUsed={tranchesUsed}
            onSetTranches={setTranchesUsed}
            savings={savings}
            onSetSavings={setSavings}
            eigenMiddelen={eigenMiddelen}
          />
        )}
        {activeTab === "settings" && (
          <InstellingenTab
            apiKey={apiKey}
            onApiKeyChange={setApiKey}
            onReset={resetAll}
            syncEnabled={syncEnabled}
            syncStatus={sync.syncStatus}
            lastSync={sync.lastSync}
            lastEditor={sync.lastEditor}
            deviceId={sync.deviceId}
            onConfigureSync={() => setShowSyncSetup(true)}
          />
        )}
      </main>

      {/* ── SYNC SETUP ── */}
      {showSyncSetup && (
        <SyncSetupModal
          initial={OnsHuisjeSync.loadSyncConfig()}
          onSaved={onSyncSaved}
          onDisable={onSyncDisable}
          onClose={() => setShowSyncSetup(false)}
        />
      )}

      {/* ── MODALS ── */}
      {modal?.type === "loading" && <LoadingModal />}

      {modal?.type === "invoice" && (
        <InvoiceModal
          invoice={modal.invoice}
          isEditing={!!modal.isEditing}
          onSave={saveInvoice}
          onClose={() => setModal(null)}
        />
      )}

      {modal?.type === "eigen" && (
        <EigenMiddelModal
          item={modal.item}
          onSave={saveEM}
          onClose={() => setModal(null)}
        />
      )}

      {modal?.type === "duplicate" && (
        <DuplicateModal
          existing={modal.existing}
          onForce={() => saveInvoice(modal.newInvoice, true)}
          onCancel={() => setModal(null)}
        />
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
